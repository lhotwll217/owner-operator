# Owner Operator vs a naive session-search baseline (issue #31): does OO's composition —
# its state DB as a locator + its neutral prompt — answer discovery/evidence questions at
# >=parity correctness, ideally for less spend, versus a plain agent that only has grep?
#
# CONTROLLED: both arms run the SAME `oo` binary at the SAME configured model
# (`.pi/settings.json`) against the SAME seeded fixture sandbox. Mutation tools are removed
# from both arms. The subject uses OO's shipped read-only composition; the baseline uses the
# same runner and search capability without OO's state/index composition. The provider modules
# are the tool-roster source of truth.
# Same framework + same model means the tool-call/token/correctness deltas are attributable
# to OO's composition, not to a model or harness difference. A cross-model version was
# retired because it changed the harness and model at once.
#
# One chain, one case set: both arms attempt every case. The DB is one of OO's tools, so
# there's no separate DB suite — the report breaks down by qtype to show WHERE OO reached
# for query_database instead of grepping.
#
# Run:   npx promptfoo eval -c eval/promptfooconfig.yaml
# Then:  node eval/compare.mjs                                  paired A/B breakdown
#
# Arms and grader all run on Codex subscription auth; the grader is a cheap model at
# minimal reasoning (it is not an arm — override via EVAL_GRADER_MODEL). No API keys needed.

description: Owner Operator vs naive session-search baseline — same model, correctness and spend

prompts:
  - '{{question}}'

providers:
  - id: file://providers/oo-agent.mjs
    label: owner-operator
    config: { timeoutMs: 600000 }
  - id: file://providers/naive-agent.mjs
    label: baseline
    config: { timeoutMs: 600000 }

defaultTest:
  options:
    provider: file://providers/codex-grader.mjs
  assert:
    # Correctness is graded per case (llm-rubric in cases.yaml).
    # Soundness gate (#31 criterion 3): evidence answers must be read from a transcript,
    # not an AI-written summary row. Fires ONLY on cases that declare expectToolAny, and
    # ONLY on the owner-operator arm. Cases may additionally require a state/DB locator
    # before direct session retrieval when the question supplies a state-backed identity;
    # open-ended discovery is allowed to locate stable IDs through session-search itself.
    # javascript-over-metadata: the documented path for a prose CLI that can't emit OTLP.
    - type: javascript
      value: file://asserts/tool-use.mjs
      metric: tool_selection
    # Efficiency telemetry as named scores (no native promptfoo assertion for tool-call
    # count/token efficiency; cost/latency have absolute-threshold asserts, not ratios).
    - type: javascript
      value: file://asserts/efficiency.mjs
      metric: efficiency_telemetry

tests: file://cases.yaml

# Resolved from the process cwd (repo root), not this file's dir.
outputPath: eval/results/latest.json

evaluateOptions:
  # One shared read-only fixture DB; sequential calls prevent repeat/log collisions and
  # make each trajectory deterministic enough to inspect. Mutation tools are removed by
  # OO_EVAL_READ_ONLY in the provider.
  maxConcurrency: 1
