# OO-only cases (issue #31): current-state, triage-history audit, staleness, and the
# locator-to-evidence handoff — questions that need the session state DB, which the
# baseline arm has no equivalent for. Gates OO's absolute correctness.
#
# Run:  npx promptfoo eval -c eval/promptfooconfig-oo.yaml

description: Owner Operator DB-dependent cases — absolute correctness gate

prompts:
  - '{{question}}'

providers:
  - id: file://providers/oo-agent.mjs
    label: owner-operator
    config: { timeoutMs: 600000 }

defaultTest:
  options:
    provider: file://providers/claude-grader.mjs
  assert:
    - type: javascript
      value: file://asserts/efficiency.mjs
      metric: efficiency_telemetry

tests: file://cases-oo.yaml

outputPath: eval/results/latest-oo.json

evaluateOptions:
  maxConcurrency: 2
