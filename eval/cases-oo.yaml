# Owner-Operator-only cases: these need the session state DB (current rows, versioned
# triage history, staleness) — the baseline arm has no equivalent surface, so they gate
# OO's absolute correctness rather than the A/B comparison.
#
# The audit case is the query_database proof: the answer only exists across
# thread_triage versions. The stale case feeds the prompt's one normative line.

- vars:
    id: state-what-needs-me
    question: "What needs me right now?"
  metadata: { qtype: state }
  assert:
    - type: llm-rubric
      value: >-
        The answer must surface the aurora-weather flaky-test thread as the thing
        needing the owner (it is the only needs-you row), with its next step being to
        review/merge PR #42. Mentioning other threads as context is fine; missing the
        needs-you thread or inventing other urgent items fails.

- vars:
    id: audit-priority-history
    question: "How has the priority of the flaky forecast cache test thread changed over time, and why?"
  metadata: { qtype: audit }
  assert:
    - type: llm-rubric
      value: >-
        The answer must trace the escalation 2 then 3 then 4 (or clearly describe a
        two-step rise from low to high), tied to the story: investigation, then the
        flake reproducing / CI failing more, then the fix ready in PR #42 awaiting
        review. A single static priority with no history fails.

- vars:
    id: stale-abandoned
    question: "Do any of my sessions look stale or abandoned?"
  metadata: { qtype: stale }
  assert:
    - type: llm-rubric
      value: >-
        The answer must identify the lumen-notes storage-migration thread as the stale
        one (idle for days, waiting on the owner's Dexie-vs-raw-IndexedDB call). An
        offer to mark it done is a plus but not required for the pass.

- vars:
    id: state-evidence-handoff
    question: "For the thread that needs me: what exactly did the agent say it changed, and how do you know?"
  metadata: { qtype: handoff }
  assert:
    - type: llm-rubric
      value: >-
        The answer must combine the state row (the flaky-test thread is the needs-you
        one) with transcript evidence: ForecastCache gained an injectable clock /
        FakeClock drives the test, PR #42 opened, tests pass. Answering only from the
        summary row (no concrete change detail like FakeClock or the clock parameter)
        fails — the point is the locator-to-evidence handoff.
