# Hermetic gate for every PR and every landing on main: typecheck, lint, and the
# model-free test tiers (unit + integration + e2e — see docs/testing.md). Never makes
# a paid model call. The widget's Swift tests run in widget.yml (macOS, path-filtered).
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # the sessions-grep blacklist test silently skips without rg — install so it gates
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
