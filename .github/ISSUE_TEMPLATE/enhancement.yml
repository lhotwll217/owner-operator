name: Enhancement
description: A capability Owner Operator should have.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Start with the user. What can't the owner do (or discover) today, and where does the limitation live? Link the code that embodies it.
      placeholder: "defaultRoots() assumes each tool writes to a fixed home-relative path, but these are configurable per agent — a relocated ~/.claude is invisible today."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What's in — concrete, checkable outcomes. Name the seams to change (KNOWN_SESSION_SOURCES, the scan skill, docs that enumerate sources, …).
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Code examples — chain of custody
      description: >-
        Code you borrowed, cited to exact lines at a commit SHA (…/blob/<SHA>/path#L10-L40) —
        not a repo or branch. Find examples with the gh-search skill; see docs/inspiration.md.
      placeholder: |
        - <what you kept>: <source> — https://github.com/owner/repo/blob/<sha>/path/to/file.ts#L51-L65
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes / out of scope
      description: Constraints, guardrails, ordering, related issues.
    validations:
      required: false
