name: Enhancement
description: A capability Owner Operator should have.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Start with the user. What can't the owner do (or discover) today, and where does the limitation live? Link the code that embodies it.
      placeholder: "defaultRoots() assumes each tool writes to a fixed home-relative path, but these are configurable per agent — a relocated ~/.claude is invisible today."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: >-
        Describe the desired outcome and known boundaries in 3–5 bullets. Name implementation
        seams only when already decided. For discovery-needed issues, list the questions to answer
        and the decision artifact instead of prescribing the implementation.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples and inspiration
      description: >-
        Patterns already found in docs/inspiration.md or other open-source repositories that may
        keep us from reinventing the wheel. Cite exact lines at a commit SHA when available;
        discovery can add this section later.
      placeholder: |
        - <pattern worth considering>: <source> — https://github.com/owner/repo/blob/<sha>/path/to/file.ts#L51-L65
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes / out of scope
      description: Constraints, guardrails, ordering, related issues.
    validations:
      required: false
